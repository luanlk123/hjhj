<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:white;
text-align:center;
}

/* container */

.container{
max-width:600px;
}

/* greeting card */

.card{
width:420px;
background:white;
color:#ff4b7d;
border-radius:20px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
margin-top:20px;
display:none;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* button */

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b7d;
cursor:pointer;
margin-top:20px;
}

/* message */

#message{
margin-top:20px;
font-size:18px;
line-height:1.6;
min-height:120px;
}

/* floating hearts */

.heart{
position:absolute;
color:white;
font-size:20px;
animation: float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-10vh);
opacity:1;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Women's Day 🌸</h1>

<p>Lại đây bey nói nhỏ...</p>

<button onclick="startMessage()">Ấn vô đi đợi j nx z ❤️</button>

<div class="card" id="card">

<h2>💌 Gửi bei</h2>

<div id="message"></div>

</div>

</div>

<script>

const text = `
Chúc bei một ngày 8/3 thật nhiều niềm vui.

Cảm ơn bei đã làm ny tui thời gian qua.

Bei không chỉ là người toi iu,
mà còn là người làm cho
mọi ngày bình thường trở nên đặc biệt.

Hy vọng rằng
dù hôm nay, ngày mai
hay rất nhiều năm sau nữa

toi vẫn sẽ là người ở bên cạnh bei mai sau này ❤️
`;

let i = 0;

function startMessage(){

document.getElementById("card").style.display="block"

let msg = document.getElementById("message");

function typing(){
if(i < text.length){
msg.innerHTML += text.charAt(i);
i++;
setTimeout(typing,40);
}
}

typing();
}

/* floating hearts */

function createHeart(){

let heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+15+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
